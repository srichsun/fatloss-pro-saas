databases:
  - name: flashsalepro-db
    plan: free
    databaseName: flashsalepro

services:
  - type: web
    name: flashsalepro
    runtime: ruby
    plan: free
    region: singapore
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flashsalepro-db
          property: connectionString
      # Auto-generated on first deploy; rotated by recreating the service.
      - key: SECRET_KEY_BASE
        generateValue: true
      # Run Solid Queue inside the Puma process — saves a worker service.
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      # Free tier has 512MB RAM; single Puma worker keeps memory in budget.
      - key: WEB_CONCURRENCY
        value: "1"
